services:
  gamer:
    build: ./hermes
    image: hermes:local
    container_name: gamer
    restart: unless-stopped
    env_file:
      - .env
    command: ["bash", "/gamer/run.sh"]
    volumes:
      - gamer-data:/home/hermes/.hermes
      - gamer-workspace:/home/hermes/workspace
      # read-only: runner + per-char strategies; prompt.txt = protocol fallback snapshot
      - ./gamer:/gamer:ro
      - ./prompt.txt:/gameprompt.txt:ro
    working_dir: /home/hermes/workspace
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  gamer-data:
  gamer-workspace:
